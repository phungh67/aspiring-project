  <div class="nyan-container">

  <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/1.10.2/jquery.min.js"></script>
  <script src="{{ url_for('static', filename='js/universe.js' )}}"></script>

  <script>
    const BUCKET_URL = "https://my-span-tree-assets.s3.us-east-1.amazonaws.com";
    const AUDIO_PREFIX = "musics/";

    const audioEl = document.getElementById('bg-music');
    const musicBtn = document.getElementById('music-toggle');

    async function initAudio() {
      try {
        console.log("Searching S3 for music files...");
        const response = await fetch(`${BUCKET_URL}?list-type=2&prefix=${AUDIO_PREFIX}`);
        if (!response.ok) throw new Error(`Could not access bucket. Status: ${response.status}`);

        const xmlText = await response.text();
        const xmlDoc = new DOMParser().parseFromString(xmlText, "application/xml");

        // Bulletproof filter: converts key to lowercase first to catch .MP3, .Mp3, .WAV, etc.
        const keys = Array.from(xmlDoc.querySelectorAll("Contents > Key"))
          .map(node => node.textContent)
          .filter(key => {
            const lowerKey = key.toLowerCase();
            return lowerKey.endsWith('.mp3') || lowerKey.endsWith('.wav') || lowerKey.endsWith('.m4a');
          });

        if (keys.length > 0) {
          console.log(`Music found! Loading: ${keys[1]}`);
          audioEl.src = `${BUCKET_URL}/${keys[1]}`;

          // Make the button visible once the source is attached
          musicBtn.style.display = 'flex';
        } else {
          console.warn("No compatible audio files (.mp3, .wav, .m4a) were found in the /musics/ folder.");
        }
      } catch (error) {
        console.error("Error fetching music from S3:", error);
      }
    }

    // Toggle Play/Pause when the button is clicked
    musicBtn.addEventListener('click', () => {
      if (!audioEl.src) return;

      if (audioEl.paused) {
        // Attempt to play, and catch any browser autoplay blocks
        audioEl.play().then(() => {
          musicBtn.innerHTML = "🔊"; // Change to unmuted icon
        }).catch(err => {
          console.error("Browser blocked playback:", err);
        });
      } else {
        audioEl.pause();
        musicBtn.innerHTML = "🔇"; // Change to muted icon
      }
    });

    // Run the fetch sequence when the page loads
    window.addEventListener('DOMContentLoaded', initAudio);
  </script>
</body>

</html>
